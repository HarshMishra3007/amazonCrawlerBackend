spring:
  application:
    name: product-intelligence-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 600000
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    ignore-migration-patterns: "*:missing"

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

crawler:
  schedule: ${CRAWL_CRON:0 0 */6 * * *}
  delay-ms: ${CRAWLER_DELAY_MS:2500}
  timeout-ms: ${CRAWLER_TIMEOUT_MS:30000}
  amazon-base-url: ${AMAZON_BASE_URL:https://www.amazon.in}
  default-currency: ${CRAWLER_DEFAULT_CURRENCY:INR}
  proxy-url: ${CRAWLER_PROXY_URL:}
  docker-mode: ${CRAWLER_DOCKER_MODE:false}
  retry:
    max-attempts: ${CRAWLER_RETRY_MAX_ATTEMPTS:3}
    delay-ms: ${CRAWLER_RETRY_DELAY_MS:3000}
    multiplier: ${CRAWLER_RETRY_MULTIPLIER:2.0}

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
